<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <title>Green Services PTY</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #0a2e1a 0%, #1a5c30 50%, #0d3d1f 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .logo-wrap {
      width: 90px;
      height: 90px;
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
      box-shadow: 0 4px 20px rgba(46,204,113,0.4);
    }

    .logo-wrap svg {
      width: 50px;
      height: 50px;
      fill: white;
    }

    h1 {
      color: #ffffff;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .tagline {
      color: rgba(255,255,255,0.65);
      font-size: 0.85rem;
      margin-top: 0.35rem;
      margin-bottom: 2rem;
    }

    .divider {
      width: 40px;
      height: 3px;
      background: linear-gradient(90deg, #2ecc71, #27ae60);
      border-radius: 2px;
      margin: 0 auto 2rem;
    }

    .label {
      color: rgba(255,255,255,0.5);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 0.85rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 0.95rem 1.25rem;
      border-radius: 14px;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      margin-bottom: 0.85rem;
      cursor: pointer;
    }

    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: scale(0.98); }

    .btn-wa {
      background: linear-gradient(135deg, #25D366, #1ebe57);
      color: white;
      box-shadow: 0 4px 18px rgba(37,211,102,0.35);
    }

    .btn-wa:hover { box-shadow: 0 6px 24px rgba(37,211,102,0.5); }

    .btn-ig {
      background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
      color: white;
      box-shadow: 0 4px 18px rgba(131,58,180,0.35);
    }

    .btn-ig:hover { box-shadow: 0 6px 24px rgba(131,58,180,0.5); }

    .btn svg { width: 22px; height: 22px; flex-shrink: 0; }

    .separator {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0.5rem 0 1.25rem;
    }
    .separator span { color: rgba(255,255,255,0.3); font-size: 0.75rem; white-space: nowrap; }
    .separator::before, .separator::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.15);
    }

    .wa-buttons { display: flex; flex-direction: column; gap: 0; }

    .footer {
      margin-top: 2rem;
      color: rgba(255,255,255,0.3);
      font-size: 0.72rem;
    }
  </style>
</head>
